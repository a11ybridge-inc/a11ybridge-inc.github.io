<!-- 
  A11YBRIDGE logo SVG — faithful trace of actual mark
  Structure: 2 tapered towers + outward cable-stay sweeps + road deck + curved approach road
-->
<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="44" height="44" rx="9" fill="#01696f"/>
  <!-- Road deck (horizontal baseline) -->
  <line x1="4" y1="28" x2="40" y2="28" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Left tower: tapered, wider base on deck, narrowing to top -->
  <path d="M17.5 28 L16.5 10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right tower -->
  <path d="M26.5 28 L27.5 10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left cable sweep: from tower top, arcing outward-down to left edge of deck -->
  <path d="M16.5 10 Q8 18 4 28" stroke="#5dcbd2" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <!-- Right cable sweep: from tower top, arcing outward-down to right edge of deck -->
  <path d="M27.5 10 Q36 18 40 28" stroke="#5dcbd2" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <!-- Inner left cable: shorter arc from tower top toward centre-left of deck -->
  <path d="M16.5 10 Q14 19 12 28" stroke="#5dcbd2" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Inner right cable -->
  <path d="M27.5 10 Q30 19 32 28" stroke="#5dcbd2" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Curved approach road: sweeps down-left from left side of deck, like your mark -->
  <path d="M10 28 Q8 32 5 38" stroke="#5dcbd2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
